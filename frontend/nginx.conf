server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routing — any path that isn't a real
    # file (e.g. /pos, /reports) must still serve index.html so the app's
    # own router can handle it. Without this, refreshing on any page other
    # than "/" returns nginx's 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively; index.html itself is never
    # cached so deploys are picked up immediately on next visit/refresh.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
